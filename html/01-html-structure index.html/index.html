<!DOCTYPE html>
<html>

<head>
  <title>01 HTML Structure</title>
</head>

<body>

<h1>HTML Basic Structure</h1>

<p>Every HTML page follows this structure.</p>

<h2>Example</h2>

<pre>
<!DOCTYPE html>
<html>
<head>
<title>My Website</title>
</head>

<body>

<h1>Hello World</h1>

</body>
</html>
</pre>

<p>
The page consists of:
</p>

<ul>
<li>DOCTYPE declaration</li>
<li>html element</li>
<li>head element</li>
<li>body element</li>
</ul>

</body>
</html>
