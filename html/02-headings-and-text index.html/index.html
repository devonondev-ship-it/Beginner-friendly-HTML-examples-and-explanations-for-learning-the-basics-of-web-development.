<!DOCTYPE html>
<html>

<head>
<title>Headings and Text</title>
</head>

<body>

<h1>Headings in HTML</h1>

<p>HTML provides six levels of headings.</p>

<h1>This is h1</h1>
<h2>This is h2</h2>
<h3>This is h3</h3>
<h4>This is h4</h4>
<h5>This is h5</h5>
<h6>This is h6</h6>

<p>This is a paragraph.</p>

<p>You can also format text.</p>

<b>Bold text</b><br>
<i>Italic text</i><br>
<u>Underline text</u>

</body>
</html>
